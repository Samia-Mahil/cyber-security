<!DOCTYPE html>
<html lang="ar" dir="rtl">
<meta property="og:image" content="https://raw.githubusercontent.com/Samia-Mahil/battery-tips/refs/heads/main/Untitled-1%20(1).jpg">
<meta property="og:title" content="حماية الحاسوب المدرسي من الفيروسات">
<meta property="og:description" content="نصائح تفاعلية للحفاظ على الحاسوب المدرسي من الفايروسات - مدرسة مدينة الشامخة">
<meta property="og:type" content="website">
<meta property="og:url" content="https://samia-mahil.github.io/battery-tips/">
 >
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حماية جهازك من الفيروسات - مدرسة مدينة الشامخة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  /* التنسيق الأساسي المستوحى من مشروعك السابق */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    padding: 32px 20px;
    font-family: 'Tajawal', sans-serif;
    direction: rtl;
  }
  .header { text-align: center; margin-bottom: 36px; }
  .school-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(99, 102, 241, 0.1);
    border: 1px solid rgba(99, 102, 241, 0.3);
    border-radius: 50px;
    padding: 8px 24px;
    margin-bottom: 16px;
    color: #818cf8;
    font-size: 13px;
  }
  h1 { font-size: clamp(22px, 5vw, 34px); font-weight: 900; color: #fff; margin-bottom: 8px; }
  .subtitle { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 16px; }
  
  /* نظام البطاقات */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    max-width: 960px;
    margin: 0 auto;
  }
  .card-wrap { perspective: 1000px; cursor: pointer; height: 260px; }
  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .card-wrap.flipped .card-inner { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    backface-visibility: hidden;
    padding: 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .card-front { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); }
  .card-back { transform: rotateY(180deg); background: #312e81; border: 2px solid #6366f1; }
  
  .front-title { font-size: 20px; font-weight: 800; color: #fff; }
  .step-emoji { font-size: 40px; }
  .back-tip { font-size: 15px; color: #fff; line-height: 1.6; }
</style>
</head>
<body>

<div class="header">
  <div class="school-badge">🛡️ مدرسة مدينة الشامخة</div>
  <h1>الأمن الرقمي وحماية الأجهزة</h1>
  <p class="subtitle">اضغط على البطاقة لتعلم كيفية حماية حاسوبك من الفيروسات</p>
</div>

<div class="grid" id="grid"></div>
 <div class="dots" id="dots"></div>
  <p class="progress-text" id="progressText">0 / 8 نصائح تمت قراءتها</p>
</div>

<div class="grid" id="grid"></div>

<p class="footer">"معاً نحو علم يرتقي ووطن يزدهر" 🇦🇪</p>

<script>
const virusSteps = [
  { emoji: "🛡️", title: "برامج الحماية", tip: "تأكد من تثبيت برنامج مكافحة فيروسات موثوق وتحديثه بانتظام لسد الثغرات الأمنية." },
  { emoji: "🔗", title: "الروابط المشبوهة", tip: "لا تفتح روابط أو مرفقات من مصادر مجهولة؛ فقد تحتوي على برمجيات خبيثة تسرق بياناتك." },
  { emoji: "🔄", title: "تحديث النظام", tip: "حدث نظام التشغيل والتطبيقات دورياً؛ التحديثات تحتوي على إصلاحات أمنية هامة." },
  { emoji: "🔑", title: "كلمات المرور", tip: "استخدم كلمة مرور قوية ومعقدة لجهازك ولا تشاركها مع أحد لحماية خصوصيتك." }
];

const grid = document.getElementById('grid');
virusSteps.forEach(s => {
  const wrap = document.createElement('div');
  wrap.className = 'card-wrap';
  wrap.innerHTML = `
    <div class="card-inner">
      <div class="card-front">
        <span class="step-emoji">${s.emoji}</span>
        <div class="front-title">${s.title}</div>
        <div style="font-size:12px; color:rgba(255,255,255,0.4)">اضغط للتفاصيل 👆</div>
      </div>
      <div class="card-back">
        <p class="back-tip">${s.tip}</p>
        <div style="font-size:11px; color:rgba(255,255,255,0.5)">إضغط للعودة 🔄</div>
      </div>
    </div>`;
  wrap.onclick = () => wrap.classList.toggle('flipped');
  grid.appendChild(wrap);
});
</script>
</body>
</html>
